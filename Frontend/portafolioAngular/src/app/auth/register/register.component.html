<!-- register.component.html -->
<div class="register-container">
    <h1>Register</h1>
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" formControlName="username" placeholder="Enter your username">
        <!-- <div *ngIf="username.touched && username.invalid" class="error">Username is required</div> -->
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" formControlName="email" placeholder="Enter your email">
        <!-- <div *ngIf="email.touched && email.invalid" class="error">Valid email is required</div> -->
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" formControlName="password" placeholder="Enter your password">
        <!-- <div *ngIf="password.touched && password.invalid" class="error">
          Password must be at least 6 characters long
        </div> -->
      </div>
      <button type="submit" [disabled]="registerForm.invalid">Register</button>
    </form>
  </div>
