<!-- cover para los modales -->
<div class="cover" [class.active]="activeCover"></div>

<div class="body">

  <div class="container">
    <div class="card" *ngFor="let service of services">
      <div class="box">
        <div class="icon">
          <div class="iconBox"><i class="fa-solid fa-code"></i></div>
        </div>
        <div class="content">
          <h3>{{ service.title }}</h3>
          <p><strong>Price:</strong> {{ service.price }}</p>
          <p><strong>Description:</strong> {{ service.description }}</p>
          <a href="#">View Details</a>
        </div>
      </div>
    </div>
  </div>

</div>
